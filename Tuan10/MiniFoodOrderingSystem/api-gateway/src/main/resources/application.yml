server:
  port: 8080

jwt:
  secret: CHUOIBIMATLANHUONGXIKDEPHVBDSBVIU423937866566CVJHB

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

        - id: food-service
          uri: http://food-service:8082
          predicates:
            - Path=/api/foods/**
          filters:
            - AuthenticationFilter

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - AuthenticationFilter

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**
          filters:
            - AuthenticationFilter
