# ======================================================================
# File cấu hình Redis tùy chỉnh (Custom redis.conf)
# ======================================================================

# Cho phép kết nối từ bên ngoài (cần thiết khi chạy trong Docker)
bind 0.0.0.0

# Lắng nghe ở cổng mặc định
port 6379

# -------------------------- Lưu trữ dữ liệu ---------------------------
# Bật tính năng AOF (Append Only File) để dữ liệu được lưu xuống ổ cứng
# Giúp không bị mất dữ liệu nếu container bị tắt đột ngột
appendonly yes

# Tên file AOF
appendfilename "appendonly.aof"

# ----------------------- Quản lý bộ nhớ (Tùy chỉnh) --------------------
# Giới hạn dung lượng RAM tối đa Redis được phép sử dụng
maxmemory 128mb

# Khi đầy RAM, xóa các key ít được sử dụng nhất (LRU - Least Recently Used)
maxmemory-policy allkeys-lru

# -------------------------------- Bảo mật -----------------------------
requirepass [PASSWORD]
